version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "8080:80"   # Host port 8080 → Container port 80
    volumes:
      - ./html:/usr/share/nginx/html:ro   # Serve static files from ./html
      - ./nginx.conf:/etc/nginx/nginx.conf:ro  # Custom config (optional)
    restart: alway